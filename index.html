<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restricted Access</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#06080e;color:#bfcfdf;font-family:'Courier New',monospace;overflow:hidden}
#lock-screen{position:fixed;inset:0;background:#06080e;display:flex;align-items:center;justify-content:center;z-index:9999}
.ls-box{border:1px solid #1a2535;padding:48px 52px;display:flex;flex-direction:column;align-items:center;gap:22px;width:360px;position:relative;background:#0e131c}
.ls-box::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:40%;height:1px;background:#c8a850}
.ls-box::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:40%;height:1px;background:#c8a850}
.ls-heading{font-size:10px;letter-spacing:5px;color:#5a7590;text-transform:uppercase}
.pw-wrap{position:relative;width:100%}
.pw-wrap input{width:100%;background:#080d14;border:1px solid #1a2535;color:#bfcfdf;font-family:'Courier New',monospace;font-size:13px;padding:11px 44px 11px 14px;outline:none;letter-spacing:2px;transition:border-color .2s}
.pw-wrap input:focus{border-color:#c8a850}
.pw-wrap input::placeholder{color:#2e3f52;letter-spacing:1px;font-size:11px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#2e3f52;cursor:pointer;font-size:14px;padding:2px;transition:color .15s}
.pw-toggle:hover{color:#5a7590}
.ls-btn{width:100%;background:rgba(200,168,80,.08);border:1px solid #c8a850;color:#c8a850;font-family:'Courier New',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;padding:12px;cursor:pointer;transition:all .2s}
.ls-btn:hover{background:rgba(200,168,80,.18)}
.ls-btn:disabled{opacity:.35;cursor:not-allowed}
.ls-err{font-size:8px;letter-spacing:2px;color:#c84040;text-align:center;min-height:13px;text-transform:uppercase}
.ls-bar{width:0;height:1px;background:#c8a850;transition:width .4s}
#app-frame{position:fixed;inset:0;display:none}
</style>
</head>
<body>
<div id="lock-screen">
  <div class="ls-box">
    <div class="ls-heading">Restricted Access</div>
    <div class="pw-wrap">
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()" autocomplete="off">
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">◎</button>
    </div>
    <div class="ls-bar" id="ls-bar"></div>
    <div class="ls-err" id="ls-err"></div>
    <button class="ls-btn" id="ls-submit" onclick="unlock()">AUTHENTICATE →</button>
  </div>
</div>
<div id="app-frame"></div>

async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decrypt(pw){
  const key=await deriveKey(pw,b64ToBytes(PAYLOAD.salt));
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(PAYLOAD.iv)},key,b64ToBytes(PAYLOAD.ct));
  return new TextDecoder().decode(plain);
}
let attempts=0,locked=false;
function togglePw(){const i=document.getElementById('pw-input'),e=document.getElementById('pw-eye');i.type=i.type==='password'?'text':'password';e.textContent=i.type==='password'?'◎':'◉';}
function setBar(w){document.getElementById('ls-bar').style.width=w+'%';}
function setErr(m){document.getElementById('ls-err').textContent=m;}
async function unlock(){
  if(locked)return;
  const pw=document.getElementById('pw-input').value;
  if(!pw){setErr('PASSWORD REQUIRED');return;}
  const btn=document.getElementById('ls-submit');
  btn.disabled=true;btn.textContent='DECRYPTING...';setErr('');setBar(40);
  try{
    const html=await decrypt(pw);
    setBar(90);
    const frame=document.getElementById('app-frame');
    frame.style.display='block';
    const iframe=document.createElement('iframe');
    iframe.style.cssText='width:100%;height:100%;border:none;display:block';
    iframe.srcdoc=html;
    frame.appendChild(iframe);
    setBar(100);
    setTimeout(()=>{document.getElementById('lock-screen').style.display='none';},280);
  }catch(e){
    attempts++;setBar(0);btn.disabled=false;btn.textContent='AUTHENTICATE →';
    if(attempts>=5){locked=true;setErr('TOO MANY ATTEMPTS — RELOAD PAGE');btn.disabled=true;btn.textContent='LOCKED';}
    else{setErr('INCORRECT PASSWORD — '+(5-attempts)+' ATTEMPTS REMAINING');document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
  }
}
</script>
